name: Notify mainagent on task assignment

on:
  repository_dispatch:
    types: [ado_task_assigned]

jobs:
  notify-main-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Extract work item details
        id: payload
        run: |
          echo "work_item_id=${{ github.event.client_payload.work_item_id }}" >> $GITHUB_OUTPUT
          echo "project_url=${{ github.event.client_payload.project_url }}" >> $GITHUB_OUTPUT

      - name: Fetch task from Azure DevOps using Mathew's PAT
        id: fetch_task
        run: |
          PAT="${{ secrets.MATHEW_ADO_PAT }}"
          ENCODED_PAT=$(echo -n ":$PAT" | base64)
          PROJECT_URL="${{ steps.payload.outputs.project_url }}"
          WORK_ITEM_ID="${{ steps.payload.outputs.work_item_id }}"

          RESPONSE=$(curl -s -X GET \
            "${PROJECT_URL}/_apis/wit/workitems/${WORK_ITEM_ID}?api-version=7.1" \
            -H "Authorization: Basic ${ENCODED_PAT}" \
            -H "Content-Type: application/json")

          echo "task_response=${RESPONSE}" >> $GITHUB_OUTPUT
          echo "Task fetched: $RESPONSE"

      - name: Send task details to Orchi
        run: |
          curl -k -X POST https://20.224.19.114/api/agents/orchi/invoke \
            -H "Content-Type: application/json" \
            -d '{
              "event": "task_assigned",
              "work_item_id": "${{ steps.payload.outputs.work_item_id }}",
              "task_data": ${{ steps.fetch_task.outputs.task_response }},
              "ado_pat": "${{ secrets.MATHEW_ADO_PAT }}"
            }'
